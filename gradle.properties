# Enable AndroidX for Android modules
# This is required for android-test-app which uses AndroidX test dependencies
android.useAndroidX=true

# Opt into Dokka Gradle plugin V2 (V1 is being removed in Dokka 2.1.0).
# Enables the dokka { ... } DSL and the dokkaGenerate aggregate task.
org.jetbrains.dokka.experimental.gradle.pluginMode=V2Enabled
org.jetbrains.dokka.experimental.gradle.pluginMode.noWarn=true
